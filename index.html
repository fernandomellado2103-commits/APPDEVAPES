<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VapeTracker">
<meta name="theme-color" content="#0d0d0f">
<link rel="manifest" href="manifest.json">
<title>Vape Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0f;
  --bg2: #131316;
  --bg3: #1a1a1f;
  --bg4: #222228;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0f0f0;
  --muted: #555;
  --muted2: #888;
  --accent: #e8ff47;
  --accent-dim: rgba(232,255,71,0.1);
  --danger: #ff4d4d;
  --danger-dim: rgba(255,77,77,0.12);
  --success: #4dff91;
  --success-dim: rgba(77,255,145,0.1);
  --info: #47b8ff;
  --safe: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{
  font-family:'DM Mono',monospace;
  background:var(--bg);
  color:var(--text);
  font-size:13px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* ── LOGIN ── */
#login-screen{
  position:fixed;inset:0;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;
  padding:2rem;
}
.login-box{
  width:100%;max-width:360px;
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:20px;
  padding:2.5rem 2rem;
  text-align:center;
}
.login-logo{
  font-family:'Syne',sans-serif;
  font-weight:800;font-size:24px;
  letter-spacing:-1px;
  margin-bottom:8px;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.login-dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 14px var(--accent);
  animation:pulse 2s ease-in-out infinite;
}
.login-sub{font-size:11px;color:var(--muted2);margin-bottom:2rem;letter-spacing:0.05em;text-transform:uppercase}
.login-field{margin-bottom:12px;text-align:left}
.login-label{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted2);margin-bottom:5px;display:block}
.login-input{
  width:100%;background:var(--bg3);border:1px solid var(--border2);
  color:var(--text);font-family:'DM Mono',monospace;font-size:14px;
  padding:11px 14px;border-radius:10px;outline:none;
  transition:border-color 0.15s,box-shadow 0.15s;
}
.login-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,255,71,0.08)}
.login-btn{
  width:100%;background:var(--accent);color:#0d0d0f;
  border:none;font-family:'Syne',sans-serif;font-weight:700;
  font-size:13px;text-transform:uppercase;letter-spacing:0.08em;
  padding:13px;border-radius:10px;cursor:pointer;margin-top:8px;
  transition:opacity 0.15s,transform 0.1s;
}
.login-btn:active{transform:scale(0.98);opacity:0.9}
.login-err{color:var(--danger);font-size:12px;margin-top:10px;min-height:18px}

/* ── SYNC STATUS ── */
.sync-bar{
  height:3px;background:var(--bg3);
  position:relative;overflow:hidden;
  flex-shrink:0;
}
.sync-bar-fill{
  height:100%;background:var(--accent);
  width:0;transition:width 0.3s;
}
.sync-bar.syncing .sync-bar-fill{
  width:100%;
  animation:syncpulse 1.2s ease-in-out infinite;
}
@keyframes syncpulse{0%,100%{opacity:0.4}50%{opacity:1}}

/* ── HEADER ── */
.header{
  border-bottom:1px solid var(--border);
  padding:0 1rem;
  display:flex;align-items:center;justify-content:space-between;
  height:56px;flex-shrink:0;
  background:rgba(13,13,15,0.95);
  backdrop-filter:blur(12px);
  padding-top:env(safe-area-inset-top,0);
}
.logo{
  font-family:'Syne',sans-serif;font-weight:800;font-size:16px;
  letter-spacing:-0.5px;display:flex;align-items:center;gap:7px;
}
.logo-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 8px var(--accent);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
.header-right{display:flex;align-items:center;gap:8px}
.sync-btn{
  background:none;border:1px solid var(--border2);color:var(--muted2);
  font-size:11px;font-family:'DM Mono',monospace;
  padding:5px 10px;border-radius:6px;cursor:pointer;
  transition:all 0.15s;display:flex;align-items:center;gap:5px;
}
.sync-btn:active{color:var(--accent);border-color:var(--accent)}
.sync-indicator{
  width:6px;height:6px;border-radius:50%;background:var(--muted);
  transition:background 0.3s;flex-shrink:0;
}
.sync-indicator.ok{background:var(--success)}
.sync-indicator.syncing{background:var(--accent);animation:pulse 0.8s infinite}
.sync-indicator.err{background:var(--danger)}
.logout-btn{
  background:none;border:none;color:var(--muted);
  font-size:18px;cursor:pointer;padding:4px;line-height:1;
}

/* ── STATS ── */
.stats-bar{
  display:grid;grid-template-columns:repeat(5,1fr);
  border-bottom:1px solid var(--border);flex-shrink:0;
  overflow-x:auto;
}
.stat-item{
  padding:0.9rem 0.75rem;
  border-right:1px solid var(--border);
  min-width:90px;
}
.stat-item:last-child{border-right:none}
.stat-label{font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:4px}
.stat-val{font-family:'Syne',sans-serif;font-size:18px;font-weight:700}
.stat-val.danger{color:var(--danger)}
.stat-val.success{color:var(--success)}

/* ── SCROLL AREA ── */
.scroll-area{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
}
.main{padding:1rem;padding-bottom:calc(80px + var(--safe));}

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(60px + var(--safe));
  padding-bottom:var(--safe);
  background:rgba(13,13,15,0.97);
  border-top:1px solid var(--border);
  display:flex;
  backdrop-filter:blur(12px);
  z-index:40;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;
  background:none;border:none;color:var(--muted2);cursor:pointer;
  font-family:'Syne',sans-serif;font-size:9px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.06em;
  transition:color 0.15s;padding-top:6px;
}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:18px;line-height:1}

/* ── PANEL ── */
.panel{display:none;animation:fadein 0.2s ease}
.panel.active{display:block}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── CARD ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:1rem}
.card-header{
  padding:0.9rem 1rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.card-title{
  font-family:'Syne',sans-serif;font-weight:700;font-size:11px;
  text-transform:uppercase;letter-spacing:0.08em;color:var(--muted2);
}

/* ── FILTERS ── */
.filters{
  display:flex;gap:6px;flex-wrap:wrap;
  padding:0.75rem 1rem;border-bottom:1px solid var(--border);
  background:var(--bg);
}
select.filter{
  background:var(--bg3);border:1px solid var(--border2);color:var(--text);
  font-family:'DM Mono',monospace;font-size:11px;
  padding:5px 8px;border-radius:6px;outline:none;flex:1;min-width:100px;
}

/* ── TABLE (mobile cards) ── */
.sale-card{
  padding:0.9rem 1rem;
  border-bottom:1px solid var(--border);
  animation:fadein 0.15s ease;
}
.sale-card:last-child{border-bottom:none}
.sale-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sale-card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.sale-card-bottom{display:flex;align-items:center;justify-content:space-between}
.sale-total{font-family:'Syne',sans-serif;font-weight:700;font-size:15px}
.sale-date{font-size:10px;color:var(--muted2)}
.sale-qty{font-size:11px;color:var(--muted2)}
.sale-nota{font-size:10px;color:var(--muted);font-style:italic;margin-top:4px}
.sale-actions{display:flex;gap:4px}

/* ── PILLS ── */
.pill{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap;
}
.pill-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.f-rojo{background:rgba(255,82,82,0.15);color:#ff8080}
.f-azul{background:rgba(77,166,255,0.15);color:#7bc4ff}
.f-sex{background:rgba(255,105,180,0.15);color:#ff9ed4}
.f-morado{background:rgba(176,108,255,0.15);color:#cc9dff}
.f-verde{background:rgba(82,224,124,0.15);color:#7deda6}
.f-malo{background:rgba(170,170,170,0.12);color:#aaa}
.f-mezcla{background:rgba(255,255,255,0.06);color:#ddd;border:1px solid rgba(255,255,255,0.1)}
.f-custom{background:rgba(232,255,71,0.1);color:#e8ff47}
.v-fernando{background:rgba(71,184,255,0.12);color:#47b8ff}
.v-fabio{background:rgba(77,255,145,0.1);color:#4dff91}
.v-amalia{background:rgba(255,105,180,0.12);color:#ff9ed4}
.v-roberto{background:rgba(255,180,50,0.12);color:#ffcc55}
.badge-pagado{background:rgba(77,255,145,0.1);color:#4dff91}
.badge-pendiente{background:rgba(255,77,77,0.12);color:#ff4d4d}

/* ── ACTION BTNS ── */
.action-btn{
  background:none;border:1px solid var(--border2);color:var(--muted2);
  font-family:'DM Mono',monospace;font-size:10px;
  padding:4px 8px;border-radius:5px;cursor:pointer;
  transition:all 0.12s;white-space:nowrap;
}
.action-btn:active{transform:scale(0.95)}
.action-btn.edit:active{color:var(--accent);border-color:var(--accent)}
.action-btn.pagar:active{color:var(--success);border-color:var(--success)}
.action-btn.cobrado:active{color:var(--danger);border-color:var(--danger)}
.action-btn.del:active{color:var(--danger);border-color:var(--danger)}

/* ── FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:1rem}
.form-field{display:flex;flex-direction:column;gap:5px}
.form-field.full{grid-column:1/-1}
.form-label{font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted2)}
.form-input,.form-select{
  background:var(--bg3);border:1px solid var(--border2);color:var(--text);
  font-family:'DM Mono',monospace;font-size:14px;
  padding:10px 12px;border-radius:9px;outline:none;width:100%;
  transition:border-color 0.15s,box-shadow 0.15s;
  -webkit-appearance:none;appearance:none;
}
.form-input:focus,.form-select:focus{
  border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,255,71,0.07);
}
.form-actions{padding:0 1rem 1rem;display:flex;gap:8px}
.btn-primary{
  flex:1;background:var(--accent);color:#0d0d0f;border:none;
  font-family:'Syne',sans-serif;font-weight:700;font-size:12px;
  text-transform:uppercase;letter-spacing:0.08em;
  padding:12px;border-radius:9px;cursor:pointer;
  transition:opacity 0.15s,transform 0.1s;
}
.btn-primary:active{transform:scale(0.98);opacity:0.9}
.btn-ghost{
  background:none;border:1px solid var(--border2);color:var(--muted2);
  font-family:'DM Mono',monospace;font-size:12px;
  padding:12px 16px;border-radius:9px;cursor:pointer;
}
.form-msg{padding:0 1rem 0.75rem;font-size:12px;min-height:18px}
.hint{
  margin-top:5px;font-size:11px;color:var(--muted2);
  padding:7px 10px;background:rgba(232,255,71,0.04);
  border:1px solid rgba(232,255,71,0.1);border-radius:7px;display:none;
}

/* ── CHARTS ── */
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.1rem;margin-bottom:1rem}
.chart-title{font-family:'Syne',sans-serif;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:1rem}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.bar-name{min-width:72px;font-size:11px;color:var(--muted2)}
.bar-track{flex:1;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 0.5s cubic-bezier(0.16,1,0.3,1)}
.bar-val{min-width:52px;text-align:right;font-size:10px;color:var(--muted2)}

/* ── EMPTY ── */
.empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-icon{font-size:28px;margin-bottom:10px;opacity:0.25}

/* ── MODAL ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);
  backdrop-filter:blur(6px);z-index:200;
  display:flex;align-items:flex-end;
  animation:fadein 0.15s ease;
}
.modal{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:20px 20px 0 0;width:100%;
  max-height:92vh;overflow-y:auto;
  padding-bottom:calc(20px + var(--safe));
}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:1.1rem 1rem;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--bg2);z-index:1;
}
.modal-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px}
.modal-close{
  background:none;border:1px solid var(--border2);color:var(--muted2);
  width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(70px + var(--safe));left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--bg3);border:1px solid var(--border2);color:var(--text);
  font-size:12px;padding:10px 18px;border-radius:20px;
  opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;z-index:300;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(77,255,145,0.3);color:var(--success)}
.toast.err{border-color:rgba(255,77,77,0.3);color:var(--danger)}

/* ── LOADING ── */
.loading{
  display:flex;align-items:center;justify-content:center;
  padding:2rem;color:var(--muted2);font-size:12px;gap:8px;
}
.spinner{
  width:14px;height:14px;border:2px solid var(--border2);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-dot"></div>
      VAPE TRACKER
    </div>
    <div class="login-sub">Gestión de ventas</div>
    <div class="login-field">
      <label class="login-label">Usuario</label>
      <input class="login-input" id="l-user" type="text" autocomplete="username" placeholder="admin">
    </div>
    <div class="login-field">
      <label class="login-label">Contraseña</label>
      <input class="login-input" id="l-pass" type="password" autocomplete="current-password" placeholder="••••••">
    </div>
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- SYNC BAR -->
<div class="sync-bar" id="sync-bar"><div class="sync-bar-fill" id="sync-fill"></div></div>

<!-- HEADER -->
<header class="header">
  <div class="logo"><div class="logo-dot"></div>VAPE TRACKER</div>
  <div class="header-right">
    <button class="sync-btn" onclick="syncData()">
      <div class="sync-indicator" id="sync-dot"></div>
      Sync
    </button>
    <button class="logout-btn" onclick="doLogout()" title="Cerrar sesión">⏻</button>
  </div>
</header>

<!-- STATS -->
<div class="stats-bar" id="stats-bar"></div>

<!-- SCROLL -->
<div class="scroll-area">
<main class="main" id="main-content">

  <!-- VENTAS -->
  <div class="panel active" id="panel-ventas">
    <div class="card">
      <div class="card-header">
        <span class="card-title">Ventas</span>
        <span id="count-label" style="font-size:10px;color:var(--muted)"></span>
      </div>
      <div class="filters">
        <select class="filter" id="f-sabor" onchange="renderList()">
          <option value="">Todos los sabores</option>
          <option>Rojo</option><option>Azul</option><option>Sex</option>
          <option>Morado</option><option>Verde</option><option>Malo</option><option>Mezcla</option>
        </select>
        <select class="filter" id="f-vendedor" onchange="renderList()">
          <option value="">Todos</option>
          <option>Fernando</option><option>Fabio</option><option>Amalia</option><option>Roberto</option>
        </select>
        <select class="filter" id="f-pago" onchange="renderList()">
          <option value="">Todos</option>
          <option value="pagado">Pagado</option>
          <option value="pendiente">Pendiente</option>
        </select>
      </div>
      <div id="lista-ventas"></div>
    </div>
  </div>

  <!-- NUEVA -->
  <div class="panel" id="panel-nueva">
    <div class="card">
      <div class="card-header"><span class="card-title">Nueva venta</span></div>
      <div class="form-grid">
        <div class="form-field">
          <label class="form-label">Fecha</label>
          <input type="date" class="form-input" id="n-fecha">
        </div>
        <div class="form-field">
          <label class="form-label">Vendedor</label>
          <select class="form-select" id="n-vendedor">
            <option value="">Selecciona...</option>
            <option>Fernando</option><option>Fabio</option><option>Amalia</option><option>Roberto</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label">Sabor</label>
          <select class="form-select" id="n-sabor" onchange="onSaborChange('n')">
            <option value="">Selecciona...</option>
            <option>Rojo</option><option>Azul</option><option>Sex</option>
            <option>Morado</option><option>Verde</option><option>Malo</option>
            <option value="Mezcla">Mezcla</option>
            <option value="__otro__">Otro...</option>
          </select>
          <input type="text" class="form-input" id="n-sabor-custom" placeholder="Escribe el sabor..." style="margin-top:8px;display:none">
          <div class="hint" id="n-hint">Especifica en notas: ej. 2 rojo, 3 azul...</div>
        </div>
        <div class="form-field">
          <label class="form-label">Cantidad</label>
          <input type="number" class="form-input" id="n-cantidad" min="1" value="1" inputmode="numeric">
        </div>
        <div class="form-field">
          <label class="form-label">Precio/ud (€)</label>
          <input type="number" class="form-input" id="n-precio" min="0" step="0.01" value="13" inputmode="decimal">
        </div>
        <div class="form-field">
          <label class="form-label">Pago</label>
          <select class="form-select" id="n-pago">
            <option value="pagado">Pagado</option>
            <option value="pendiente">Pendiente</option>
          </select>
        </div>
        <div class="form-field full">
          <label class="form-label">Notas</label>
          <input type="text" class="form-input" id="n-notas" placeholder="Observaciones...">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-primary" onclick="addSale()">Guardar venta</button>
        <button class="btn-ghost" onclick="clearForm()">✕</button>
      </div>
      <div class="form-msg" id="n-msg"></div>
    </div>
  </div>

  <!-- RESUMEN -->
  <div class="panel" id="panel-resumen">
    <div class="chart-card">
      <div class="chart-title">Por sabor</div>
      <div id="chart-sabor"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Por vendedor</div>
      <div id="chart-vendedor"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Pendiente de cobro</div>
      <div id="chart-deuda"></div>
    </div>
  </div>

</main>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-item active" onclick="switchTab('ventas')" id="nav-ventas">
    <span class="nav-icon">📋</span>
    Ventas
  </button>
  <button class="nav-item" onclick="switchTab('nueva')" id="nav-nueva">
    <span class="nav-icon">＋</span>
    Nueva
  </button>
  <button class="nav-item" onclick="switchTab('resumen')" id="nav-resumen">
    <span class="nav-icon">📊</span>
    Resumen
  </button>
</nav>

<!-- EDIT MODAL -->
<div class="overlay" id="modal-overlay" style="display:none" onclick="overlayClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head">
      <span class="modal-title">Editar venta</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-field">
        <label class="form-label">Fecha</label>
        <input type="date" class="form-input" id="e-fecha">
      </div>
      <div class="form-field">
        <label class="form-label">Vendedor</label>
        <select class="form-select" id="e-vendedor">
          <option>Fernando</option><option>Fabio</option><option>Amalia</option><option>Roberto</option>
        </select>
      </div>
      <div class="form-field">
        <label class="form-label">Sabor</label>
        <select class="form-select" id="e-sabor" onchange="onSaborChange('e')">
          <option>Rojo</option><option>Azul</option><option>Sex</option>
          <option>Morado</option><option>Verde</option><option>Malo</option>
          <option value="Mezcla">Mezcla</option>
          <option value="__otro__">Otro...</option>
        </select>
        <input type="text" class="form-input" id="e-sabor-custom" placeholder="Escribe el sabor..." style="margin-top:8px;display:none">
        <div class="hint" id="e-hint">Especifica en notas: ej. 2 rojo, 3 azul...</div>
      </div>
      <div class="form-field">
        <label class="form-label">Cantidad</label>
        <input type="number" class="form-input" id="e-cantidad" min="1" inputmode="numeric">
      </div>
      <div class="form-field">
        <label class="form-label">Precio/ud (€)</label>
        <input type="number" class="form-input" id="e-precio" min="0" step="0.01" inputmode="decimal">
      </div>
      <div class="form-field">
        <label class="form-label">Pago</label>
        <select class="form-select" id="e-pago">
          <option value="pagado">Pagado</option>
          <option value="pendiente">Pendiente</option>
        </select>
      </div>
      <div class="form-field full">
        <label class="form-label">Notas</label>
        <input type="text" class="form-input" id="e-notas">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" onclick="saveEdit()">Guardar cambios</button>
      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
    </div>
    <div class="form-msg" id="e-msg"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── CONFIG
const USERS = { admin: 'admin' };
const STORAGE_KEY = 'vape_tracker_v2';
const SYNC_KEY = 'vape_sync_ts';

const SABORES_FIJOS = ['Rojo','Azul','Sex','Morado','Verde','Malo','Mezcla'];
const VENDEDORES = ['Fernando','Fabio','Amalia','Roberto'];
const FLAVOR = {
  Rojo:   {cls:'f-rojo',   color:'#ff5252'},
  Azul:   {cls:'f-azul',   color:'#4da6ff'},
  Sex:    {cls:'f-sex',    color:'#ff69b4'},
  Morado: {cls:'f-morado', color:'#b06cff'},
  Verde:  {cls:'f-verde',  color:'#52e07c'},
  Malo:   {cls:'f-malo',   color:'#888'},
  Mezcla: {cls:'f-mezcla', color:'#999'},
};
const VEND = {
  Fernando:{cls:'v-fernando',color:'#47b8ff'},
  Fabio:   {cls:'v-fabio',   color:'#4dff91'},
  Amalia:  {cls:'v-amalia',  color:'#ff9ed4'},
  Roberto: {cls:'v-roberto', color:'#ffcc55'},
};

// ── STATE
let sales = [];
let editingId = null;
let loggedIn = false;

// ── LOCAL STORAGE
function loadLocal() {
  try { const d = JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); if(Array.isArray(d)) sales=d; } catch(e){}
}
function saveLocal() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(sales)); } catch(e){}
}

// ── SYNC WITH CLAUDE API (shared storage via anthropic artifacts storage)
// We use window.storage from the Anthropic artifacts API to sync across devices
async function syncData(showFeedback=true) {
  setSyncState('syncing');
  try {
    // Try to get remote data
    let remote = null;
    try {
      const res = await window.storage.get('vape_sales_shared', true);
      if (res && res.value) remote = JSON.parse(res.value);
    } catch(e) {}

    if (remote && Array.isArray(remote)) {
      // Merge: combine local + remote, deduplicate by id, keep latest version
      const merged = mergeArrays(sales, remote);
      sales = merged;
    }

    // Push merged to remote
    await window.storage.set('vape_sales_shared', JSON.stringify(sales), true);
    saveLocal();
    localStorage.setItem(SYNC_KEY, Date.now().toString());
    setSyncState('ok');
    if(showFeedback) toast('Sincronizado ✓', 'ok');
    refresh();
  } catch(e) {
    setSyncState('err');
    if(showFeedback) toast('Sin conexión, datos locales', 'err');
  }
}

function mergeArrays(a, b) {
  const map = new Map();
  [...b, ...a].forEach(s => map.set(s.id, s));
  return Array.from(map.values()).sort((x,y) => y.id - x.id);
}

async function pushData() {
  try {
    await window.storage.set('vape_sales_shared', JSON.stringify(sales), true);
    localStorage.setItem(SYNC_KEY, Date.now().toString());
    setSyncState('ok');
  } catch(e) {
    setSyncState('err');
  }
}

function setSyncState(state) {
  const dot = document.getElementById('sync-dot');
  const bar = document.getElementById('sync-bar');
  dot.className = 'sync-indicator ' + state;
  bar.className = 'sync-bar ' + (state==='syncing'?'syncing':'');
}

// ── LOGIN
function doLogin() {
  const u = document.getElementById('l-user').value.trim();
  const p = document.getElementById('l-pass').value;
  const err = document.getElementById('login-err');
  if(USERS[u.toLowerCase()] === p) {
    loggedIn = true;
    document.getElementById('login-screen').style.display = 'none';
    localStorage.setItem('vape_authed', '1');
    init();
  } else {
    err.textContent = 'Usuario o contraseña incorrectos';
    document.getElementById('l-pass').value = '';
    setTimeout(()=>err.textContent='', 3000);
  }
}

document.getElementById('l-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('l-user').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('l-pass').focus(); });

function doLogout() {
  localStorage.removeItem('vape_authed');
  loggedIn = false;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('l-user').value = '';
  document.getElementById('l-pass').value = '';
}

// ── INIT
function init() {
  loadLocal();
  refresh();
  syncData(false);
  // Auto-sync every 30s
  setInterval(() => syncData(false), 30000);
}

// Check if already logged in
if(localStorage.getItem('vape_authed') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  init();
}

// ── TABS
function switchTab(tab) {
  ['ventas','nueva','resumen'].forEach(t => {
    document.getElementById('panel-'+t).classList.toggle('active', t===tab);
    document.getElementById('nav-'+t).classList.toggle('active', t===tab);
  });
  if(tab==='resumen') renderCharts();
  document.querySelector('.scroll-area').scrollTop = 0;
}

// ── PILLS
function fPill(sabor) {
  if(sabor === 'Mezcla') return `<span class="pill f-mezcla">Mezcla</span>`;
  const f = FLAVOR[sabor];
  if(f) return `<span class="pill ${f.cls}"><span class="pill-dot" style="background:${f.color}"></span>${sabor}</span>`;
  return `<span class="pill f-custom">${sabor}</span>`;
}
function vPill(v) {
  const c = VEND[v] || {cls:'f-custom'};
  return `<span class="pill ${c.cls}">${v}</span>`;
}
function badgePago(p) {
  return p==='pagado'
    ? `<span class="pill badge-pagado">Pagado</span>`
    : `<span class="pill badge-pendiente">Pendiente</span>`;
}

// ── STATS
function renderStats() {
  const uds = sales.reduce((a,s)=>a+s.cantidad,0);
  const pendUds = sales.filter(s=>s.pago==='pendiente').reduce((a,s)=>a+s.cantidad,0);
  const pendEur = sales.filter(s=>s.pago==='pendiente'&&s.precio>0).reduce((a,s)=>a+(s.cantidad*s.precio),0);
  const totalEur = sales.filter(s=>s.precio>0).reduce((a,s)=>a+(s.cantidad*s.precio),0);
  document.getElementById('stats-bar').innerHTML = [
    ['Ventas', sales.length, ''],
    ['Unidades', uds, ''],
    ['Pend. uds.', pendUds, 'danger'],
    ['Por cobrar', pendEur>0?'€'+pendEur.toFixed(2):'-', 'danger'],
    ['Facturado', totalEur>0?'€'+totalEur.toFixed(2):'-', 'success'],
  ].map(([l,v,cls])=>`<div class="stat-item"><div class="stat-label">${l}</div><div class="stat-val ${cls}">${v}</div></div>`).join('');
}

// ── LIST
function filtered() {
  const fS = document.getElementById('f-sabor').value;
  const fV = document.getElementById('f-vendedor').value;
  const fP = document.getElementById('f-pago').value;
  return sales.filter(s=>(!fS||s.sabor===fS)&&(!fV||s.vendedor===fV)&&(!fP||s.pago===fP));
}

function renderList() {
  const list = filtered();
  document.getElementById('count-label').textContent = list.length + ' venta' + (list.length!==1?'s':'');
  const el = document.getElementById('lista-ventas');
  if(!list.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">○</div>Sin ventas</div>`;
    return;
  }
  el.innerHTML = list.map(s => {
    const total = s.precio>0 ? '€'+(s.cantidad*s.precio).toFixed(2) : '—';
    return `<div class="sale-card">
      <div class="sale-card-top">
        <div class="sale-card-meta">
          ${fPill(s.sabor)}
          ${vPill(s.vendedor)}
          ${badgePago(s.pago)}
        </div>
        <span class="sale-date">${s.fecha}</span>
      </div>
      ${s.notas?`<div class="sale-nota">${s.notas}</div>`:''}
      <div class="sale-card-bottom" style="margin-top:8px">
        <div style="display:flex;gap:6px;align-items:center">
          <span class="sale-total">${total}</span>
          <span class="sale-qty">× ${s.cantidad} ud.</span>
        </div>
        <div class="sale-actions">
          <button class="action-btn edit" onclick="openEdit(${s.id})">Editar</button>
          <button class="action-btn ${s.pago==='pagado'?'cobrado':'pagar'}" onclick="togglePago(${s.id})">
            ${s.pago==='pagado'?'Pend.':'Cobrado'}
          </button>
          <button class="action-btn del" onclick="delSale(${s.id})">✕</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── FORM
function onSaborChange(prefix) {
  const v = document.getElementById(prefix+'-sabor').value;
  document.getElementById(prefix+'-hint').style.display = v==='Mezcla'?'block':'none';
  const custom = document.getElementById(prefix+'-sabor-custom');
  custom.style.display = v==='__otro__'?'block':'none';
  if(v==='__otro__') custom.focus();
}
function getSabor(prefix) {
  const sel = document.getElementById(prefix+'-sabor').value;
  if(sel==='__otro__') return document.getElementById(prefix+'-sabor-custom').value.trim();
  return sel;
}

function today() { return new Date().toISOString().slice(0,10); }
document.getElementById('n-fecha').value = today();
document.getElementById('n-precio').value = '13';

function addSale() {
  const fecha = document.getElementById('n-fecha').value;
  const vendedor = document.getElementById('n-vendedor').value;
  const sabor = getSabor('n');
  const cantidad = parseInt(document.getElementById('n-cantidad').value)||0;
  const precio = parseFloat(document.getElementById('n-precio').value)||0;
  const pago = document.getElementById('n-pago').value;
  const notas = document.getElementById('n-notas').value.trim();
  const msg = document.getElementById('n-msg');
  if(!fecha||!vendedor||!sabor||cantidad<1) {
    msg.style.color='var(--danger)';
    msg.textContent='Rellena fecha, vendedor, sabor y cantidad.';
    return;
  }
  const newSale = {id:Date.now(), fecha, vendedor, sabor, cantidad, precio, pago, notas};
  sales.unshift(newSale);
  saveLocal();
  pushData();
  refresh();
  msg.style.color='var(--success)';
  msg.textContent='Venta guardada.';
  clearForm(true);
  setTimeout(()=>{ msg.textContent=''; },3000);
  toast('Venta guardada ✓','ok');
}

function clearForm(keep) {
  if(!keep) document.getElementById('n-msg').textContent='';
  ['n-vendedor','n-sabor'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('n-cantidad').value='1';
  document.getElementById('n-precio').value='13';
  document.getElementById('n-pago').value='pagado';
  document.getElementById('n-notas').value='';
  document.getElementById('n-fecha').value=today();
  document.getElementById('n-hint').style.display='none';
  document.getElementById('n-sabor-custom').style.display='none';
  document.getElementById('n-sabor-custom').value='';
}

// ── EDIT
function openEdit(id) {
  const s = sales.find(x=>x.id===id);
  if(!s) return;
  editingId = id;
  document.getElementById('e-fecha').value = s.fecha;
  document.getElementById('e-vendedor').value = s.vendedor;
  const esFijo = SABORES_FIJOS.includes(s.sabor);
  document.getElementById('e-sabor').value = esFijo ? s.sabor : '__otro__';
  const custom = document.getElementById('e-sabor-custom');
  custom.value = esFijo ? '' : s.sabor;
  custom.style.display = esFijo ? 'none' : 'block';
  document.getElementById('e-cantidad').value = s.cantidad;
  document.getElementById('e-precio').value = s.precio||13;
  document.getElementById('e-pago').value = s.pago;
  document.getElementById('e-notas').value = s.notas||'';
  document.getElementById('e-hint').style.display = s.sabor==='Mezcla'?'block':'none';
  document.getElementById('e-msg').textContent='';
  document.getElementById('modal-overlay').style.display='flex';
}
function closeModal() {
  document.getElementById('modal-overlay').style.display='none';
  editingId=null;
}
function overlayClick(e) {
  if(e.target===document.getElementById('modal-overlay')) closeModal();
}
function saveEdit() {
  const s = sales.find(x=>x.id===editingId);
  if(!s) return;
  const fecha = document.getElementById('e-fecha').value;
  const vendedor = document.getElementById('e-vendedor').value;
  const sabor = getSabor('e');
  const cantidad = parseInt(document.getElementById('e-cantidad').value)||0;
  const precio = parseFloat(document.getElementById('e-precio').value)||0;
  const pago = document.getElementById('e-pago').value;
  const notas = document.getElementById('e-notas').value.trim();
  const msg = document.getElementById('e-msg');
  if(!fecha||!vendedor||!sabor||cantidad<1) {
    msg.style.color='var(--danger)'; msg.textContent='Rellena todos los campos.'; return;
  }
  Object.assign(s,{fecha,vendedor,sabor,cantidad,precio,pago,notas});
  saveLocal(); pushData(); refresh(); closeModal();
  toast('Venta actualizada ✓','ok');
}

// ── TOGGLE / DELETE
function togglePago(id) {
  const s=sales.find(x=>x.id===id);
  if(!s) return;
  s.pago = s.pago==='pagado'?'pendiente':'pagado';
  saveLocal(); pushData(); refresh();
  toast(s.pago==='pagado'?'Marcado como pagado':'Marcado como pendiente','ok');
}
function delSale(id) {
  if(!confirm('¿Eliminar esta venta?')) return;
  sales=sales.filter(x=>x.id!==id);
  saveLocal(); pushData(); refresh();
  toast('Venta eliminada','err');
}

// ── CHARTS
function renderCharts() {
  const allSabores = [...new Set([...SABORES_FIJOS, ...sales.map(s=>s.sabor)])];
  const bySabor={}, byVend={}, deudaVend={};
  allSabores.forEach(k=>bySabor[k]=0);
  VENDEDORES.forEach(v=>{byVend[v]=0;deudaVend[v]=0;});
  sales.forEach(s=>{
    bySabor[s.sabor]=(bySabor[s.sabor]||0)+s.cantidad;
    byVend[s.vendedor]=(byVend[s.vendedor]||0)+s.cantidad;
    if(s.pago==='pendiente')
      deudaVend[s.vendedor]=(deudaVend[s.vendedor]||0)+(s.precio>0?s.cantidad*s.precio:s.cantidad);
  });

  const maxS=Math.max(...Object.values(bySabor),1);
  document.getElementById('chart-sabor').innerHTML=allSabores.map(k=>{
    const v=bySabor[k]||0;
    const c=FLAVOR[k]||{color:'#e8ff47'};
    return `<div class="bar-row">
      <span class="bar-name">${k}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/maxS*100)}%;background:${c.color}"></div></div>
      <span class="bar-val">${v} uds.</span>
    </div>`;
  }).join('');

  const maxV=Math.max(...Object.values(byVend),1);
  document.getElementById('chart-vendedor').innerHTML=VENDEDORES.map(k=>{
    const v=byVend[k]||0;
    const c=VEND[k]||{color:'#888'};
    return `<div class="bar-row">
      <span class="bar-name">${k}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/maxV*100)}%;background:${c.color}"></div></div>
      <span class="bar-val">${v} uds.</span>
    </div>`;
  }).join('');

  const hasPrecio=s=>s.pago==='pendiente'&&s.precio>0;
  const anyDebt=Object.values(deudaVend).some(v=>v>0);
  const maxD=Math.max(...Object.values(deudaVend),1);
  document.getElementById('chart-deuda').innerHTML=anyDebt
    ? VENDEDORES.map(k=>{
        const v=deudaVend[k]||0;
        const wp=sales.some(s=>s.vendedor===k&&hasPrecio(s));
        const label=v>0?(wp?'€'+v.toFixed(2):v+' uds.'):'—';
        return `<div class="bar-row">
          <span class="bar-name">${k}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/maxD*100)}%;background:${v>0?'var(--danger)':'var(--bg4)'}"></div></div>
          <span class="bar-val" style="color:${v>0?'var(--danger)':'var(--muted)'}">${label}</span>
        </div>`;
      }).join('')
    : `<div style="color:var(--success);font-size:12px;padding:4px 0">Todo cobrado ✓</div>`;
}

// ── TOAST
let toastTimer;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ el.className='toast'; }, 2500);
}

// ── REFRESH
function refresh() { renderStats(); renderList(); }

// ── SERVICE WORKER
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
